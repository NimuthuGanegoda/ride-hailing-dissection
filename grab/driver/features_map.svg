<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f4f7f6" />
  
  <!-- Central Hub: Grab Driver App -->
  <rect x="300" y="250" width="200" height="100" rx="10" fill="#00b14f" stroke="#ffffff" stroke-width="3" />
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Grab Driver</text>
  <text x="400" y="325" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Logistics Orchestrator</text>

  <!-- Job Dispatch -->
  <rect x="50" y="50" width="180" height="80" rx="5" fill="#ffffff" stroke="#00b14f" stroke-width="2" />
  <text x="140" y="80" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Job Dispatch</text>
  <text x="140" y="100" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Ride, Food, Mart, Express</text>
  <line x1="230" y1="130" x2="300" y2="250" stroke="#00b14f" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Navigation & GIS -->
  <rect x="570" y="50" width="180" height="80" rx="5" fill="#ffffff" stroke="#00b14f" stroke-width="2" />
  <text x="660" y="80" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">GrabMaps Driver</text>
  <text x="660" y="100" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">POI Contribution, Route Matching</text>
  <line x1="570" y1="130" x2="500" y2="250" stroke="#00b14f" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Financials -->
  <rect x="50" y="470" width="180" height="80" rx="5" fill="#ffffff" stroke="#00b14f" stroke-width="2" />
  <text x="140" y="500" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Driver Wallet</text>
  <text x="140" y="520" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Instant Payouts, GrabFin</text>
  <line x1="230" y1="470" x2="300" y2="350" stroke="#00b14f" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Safety & Monitoring -->
  <rect x="570" y="470" width="180" height="80" rx="5" fill="#ffffff" stroke="#00b14f" stroke-width="2" />
  <text x="660" y="500" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Safety &amp; AI</text>
  <text x="660" y="520" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Fatigue Monitoring, Audio Log</text>
  <line x1="570" y1="470" x2="500" y2="350" stroke="#00b14f" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Telemetry -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle">Telemetry: MonitorSDK, Driver-AI, IoT-App-UI</text>
</svg>
