<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0c" rx="15" ry="15"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Cinzel, serif" font-size="28" fill="#6a0dad" text-anchor="middle" font-weight="bold">PickMe Ecosystem: Architectural Dissection</text>
  <text x="400" y="80" font-family="Quicksand, sans-serif" font-size="14" fill="#888" text-anchor="middle">Mapping the Inner Workings for the Database Manager</text>

  <!-- Passenger App -->
  <rect x="50" y="150" width="220" height="120" rx="10" ry="10" fill="#16161a" stroke="#1565C0" stroke-width="2"/>
  <text x="160" y="180" font-family="Quicksand, sans-serif" font-size="18" fill="#e0e0e0" text-anchor="middle" font-weight="bold">📱 Passenger App</text>
  <text x="160" y="205" font-family="Quicksand, sans-serif" font-size="12" fill="#888" text-anchor="middle">com.pickme.passenger</text>
  <line x1="100" y1="215" x2="220" y2="215" stroke="#2d2d35" stroke-width="1"/>
  <text x="160" y="235" font-family="Quicksand, sans-serif" font-size="11" fill="#bbb" text-anchor="middle">• Real-time Booking</text>
  <text x="160" y="250" font-family="Quicksand, sans-serif" font-size="11" fill="#bbb" text-anchor="middle">• Tracking &amp; Payment</text>

  <!-- Driver App -->
  <rect x="50" y="350" width="220" height="120" rx="10" ry="10" fill="#16161a" stroke="#6a0dad" stroke-width="2"/>
  <text x="160" y="380" font-family="Quicksand, sans-serif" font-size="18" fill="#e0e0e0" text-anchor="middle" font-weight="bold">🚛 Driver App</text>
  <text x="160" y="405" font-family="Quicksand, sans-serif" font-size="12" fill="#888" text-anchor="middle">com.pickme.driver.byod</text>
  <line x1="100" y1="415" x2="220" y2="415" stroke="#2d2d35" stroke-width="1"/>
  <text x="160" y="435" font-family="Quicksand, sans-serif" font-size="11" fill="#bbb" text-anchor="middle">• Job Dispatching</text>
  <text x="160" y="450" font-family="Quicksand, sans-serif" font-size="11" fill="#bbb" text-anchor="middle">• Driver Management</text>

  <!-- Central Backend -->
  <rect x="450" y="220" width="300" height="180" rx="10" ry="10" fill="#16161a" stroke="#ffae00" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="600" y="255" font-family="Quicksand, sans-serif" font-size="20" fill="#ffae00" text-anchor="middle" font-weight="bold">☁️ PickMe Cloud &amp; APIs</text>
  <text x="600" y="280" font-family="Quicksand, sans-serif" font-size="12" fill="#888" text-anchor="middle">api.pickme.lk | driver-api-go.pickme.lk</text>
  <line x1="500" y1="295" x2="700" y2="295" stroke="#2d2d35" stroke-width="1"/>
  <text x="600" y="320" font-family="Quicksand, sans-serif" font-size="12" fill="#bbb" text-anchor="middle">Core Logic, Dispatching Engine,</text>
  <text x="600" y="340" font-family="Quicksand, sans-serif" font-size="12" fill="#bbb" text-anchor="middle">and Real-time Communication Servers</text>

  <!-- Connections -->
  <path d="M 270 210 L 450 250" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 270 410 L 450 370" stroke="#6a0dad" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- External Systems -->
  <rect x="450" y="480" width="300" height="80" rx="8" ry="8" fill="#101014" stroke="#444" stroke-width="1"/>
  <text x="600" y="505" font-family="Quicksand, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle" font-weight="bold">External Systems</text>
  <text x="600" y="525" font-family="Quicksand, sans-serif" font-size="11" fill="#888" text-anchor="middle">CyberSource (Payments), Google Maps (GIS),</text>
  <text x="600" y="540" font-family="Quicksand, sans-serif" font-size="11" fill="#888" text-anchor="middle">Firebase (FCM), ML Kit (Barcodes)</text>
  
  <path d="M 600 400 L 600 480" stroke="#444" stroke-width="2" stroke-dasharray="3,3" fill="none"/>

  <!-- Arrows -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1565C0" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6a0dad" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="585" font-family="Quicksand, sans-serif" font-size="10" fill="#444" text-anchor="middle">Security &amp; Integrity Record • Lead Prototyper: Nimuthu Ganegoda • AI Oversight: Mommy</text>
</svg>
