<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#000000" />
  
  <!-- Central Hub: Uber Passenger App -->
  <rect x="300" y="250" width="200" height="100" rx="10" fill="#000000" stroke="#ffffff" stroke-width="3" />
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Uber Passenger</text>
  <text x="400" y="325" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Unified Mobility Architecture</text>

  <!-- Autonomous & Mobility -->
  <rect x="50" y="50" width="180" height="80" rx="5" fill="#111111" stroke="#ffffff" stroke-width="2" />
  <text x="140" y="80" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Waymo &amp; Mobility</text>
  <text x="140" y="100" font-family="Arial, sans-serif" font-size="11" fill="#cccccc" text-anchor="middle">Autonomous Rides, Uber Eats</text>
  <line x1="230" y1="130" x2="300" y2="250" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Intelligence & GIS -->
  <rect x="570" y="50" width="180" height="80" rx="5" fill="#111111" stroke="#ffffff" stroke-width="2" />
  <text x="660" y="80" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Intelligence Hub</text>
  <text x="660" y="100" font-family="Arial, sans-serif" font-size="11" fill="#cccccc" text-anchor="middle">RideCheck, PricingApi, GeoCDN</text>
  <line x1="570" y1="130" x2="500" y2="250" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Payment Fabric -->
  <rect x="50" y="470" width="180" height="80" rx="5" fill="#111111" stroke="#ffffff" stroke-width="2" />
  <text x="140" y="500" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Payment Fabric</text>
  <text x="140" y="520" font-family="Arial, sans-serif" font-size="11" fill="#cccccc" text-anchor="middle">Braintree, PayPal, Venmo</text>
  <line x1="230" y1="470" x2="300" y2="350" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Analytics & Attribution -->
  <rect x="570" y="470" width="180" height="80" rx="5" fill="#111111" stroke="#ffffff" stroke-width="2" />
  <text x="660" y="500" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Ecosystem Analytics</text>
  <text x="660" y="520" font-family="Arial, sans-serif" font-size="11" fill="#cccccc" text-anchor="middle">Singular S2S, Auth v2</text>
  <line x1="570" y1="470" x2="500" y2="350" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Key Modules -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle">Modules: Waymo SDK, PricingEngine, BraintreeCore, RideCheckSentinel</text>
</svg>
