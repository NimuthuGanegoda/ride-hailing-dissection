<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">Bolt Driver Architectural Features</text>
  
  <!-- Core Node -->
  <rect x="300" y="100" width="200" height="80" rx="10" fill="#2eb85c" stroke="#1d965c" stroke-width="2"/>
  <text x="400" y="145" font-family="Arial" font-size="18" fill="white" text-anchor="middle">Core Engine</text>
  
  <!-- Sub-systems -->
  <!-- Telemetry -->
  <rect x="50" y="250" width="180" height="100" rx="8" fill="#3399ff" stroke="#268bd2" stroke-width="2"/>
  <text x="140" y="280" font-family="Arial" font-size="16" fill="white" text-anchor="middle">Telemetry</text>
  <text x="140" y="305" font-family="Arial" font-size="12" fill="white" text-anchor="middle">- Persistent Location</text>
  <text x="140" y="325" font-family="Arial" font-size="12" fill="white" text-anchor="middle">- App Logging</text>
  
  <!-- GIS & Navigation -->
  <rect x="280" y="250" width="240" height="100" rx="8" fill="#f9b115" stroke="#e1a113" stroke-width="2"/>
  <text x="400" y="280" font-family="Arial" font-size="16" fill="white" text-anchor="middle">GIS &amp; Navigation</text>
  <text x="400" y="305" font-family="Arial" font-size="12" fill="white" text-anchor="middle">- Google Maps SDK</text>
  <text x="400" y="325" font-family="Arial" font-size="12" fill="white" text-anchor="middle">- Custom Map Styles</text>
  
  <!-- ML & Vision -->
  <rect x="570" y="250" width="180" height="100" rx="8" fill="#e55353" stroke="#d93737" stroke-width="2"/>
  <text x="660" y="280" font-family="Arial" font-size="16" fill="white" text-anchor="middle">ML &amp; Vision</text>
  <text x="660" y="305" font-family="Arial" font-size="12" fill="white" text-anchor="middle">- MobileNetV1</text>
  <text x="660" y="325" font-family="Arial" font-size="12" fill="white" text-anchor="middle">- Doc Verification</text>
  
  <!-- Fleet -->
  <rect x="310" y="420" width="180" height="80" rx="8" fill="#636f83" stroke="#4f5d73" stroke-width="2"/>
  <text x="400" y="455" font-family="Arial" font-size="16" fill="white" text-anchor="middle">Fleet Portal</text>
  <text x="400" y="480" font-family="Arial" font-size="12" fill="white" text-anchor="middle">- Partner Management</text>
  
  <!-- Connectors -->
  <line x1="400" y1="180" x2="140" y2="250" stroke="#ccc" stroke-width="2"/>
  <line x1="400" y1="180" x2="400" y2="250" stroke="#ccc" stroke-width="2"/>
  <line x1="400" y1="180" x2="660" y2="250" stroke="#ccc" stroke-width="2"/>
  <line x1="400" y1="350" x2="400" y2="420" stroke="#ccc" stroke-width="2"/>
</svg>
